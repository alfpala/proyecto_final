<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MarketTech — Registro</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
  <link rel="stylesheet" href="css/styles.css"/>
</head>
<body style="background:linear-gradient(135deg,#065f46 0%,#0891b2 100%);min-height:100vh;display:flex;flex-direction:column;">
<nav class="navbar navbar-dark px-4 py-3">
  <a class="navbar-brand fw-bold" href="index.html">Market<span style="color:#f59e0b">Tech</span></a>
</nav>

<main class="flex-grow-1 d-flex align-items-center justify-content-center py-5 px-3">
  <div style="width:100%;max-width:480px">
    <div class="card auth-card p-4 p-md-5">
      <div class="text-center mb-4">
        <div class="bg-success rounded-circle d-inline-flex align-items-center justify-content-center mb-3" style="width:64px;height:64px">
          <i class="bi bi-person-plus-fill text-white fs-3"></i>
        </div>
        <h2 class="fw-bold">Crear Cuenta</h2>
        <p class="text-muted small">¿Ya tienes cuenta? <a href="login.html" class="text-primary">Iniciar sesión</a></p>
      </div>

      <div id="alertBox" class="alert d-none" role="alert"></div>

      <form id="registerForm" novalidate>
        <div class="mb-3">
          <label class="form-label fw-semibold">Nombre completo</label>
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-person"></i></span>
            <input type="text" id="name" class="form-control" placeholder="Juan Pérez" required/>
          </div>
        </div>
        <div class="mb-3">
          <label class="form-label fw-semibold">Correo electrónico</label>
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-envelope"></i></span>
            <input type="email" id="email" class="form-control" placeholder="tu@email.com" required/>
          </div>
        </div>
        <div class="mb-3">
          <label class="form-label fw-semibold">Contraseña</label>
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-lock"></i></span>
            <input type="password" id="password" class="form-control" placeholder="Mínimo 6 caracteres" required minlength="6"/>
            <button type="button" class="btn btn-outline-secondary" id="togglePwd">
              <i class="bi bi-eye"></i>
            </button>
          </div>
        </div>
        <div class="mb-4">
          <label class="form-label fw-semibold">Confirmar contraseña</label>
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-lock-fill"></i></span>
            <input type="password" id="password2" class="form-control" placeholder="Repite tu contraseña" required/>
          </div>
        </div>

        <!-- Password strength meter -->
        <div class="mb-3">
          <div class="progress" style="height:5px">
            <div id="pwdStrengthBar" class="progress-bar" style="width:0%;transition:.3s"></div>
          </div>
          <small id="pwdStrengthLabel" class="text-muted"></small>
        </div>

        <div class="form-check mb-3">
          <input class="form-check-input" type="checkbox" id="terms" required/>
          <label class="form-check-label small" for="terms">
            Acepto los <a href="#" class="text-primary">Términos y Condiciones</a> y la <a href="#" class="text-primary">Política de Privacidad</a>
          </label>
        </div>

        <button type="submit" id="submitBtn" class="btn btn-success w-100 py-2 fw-semibold fs-5">
          <span id="btnText">Crear Cuenta</span>
          <span id="btnSpinner" class="spinner-border spinner-border-sm d-none ms-2"></span>
        </button>
      </form>
    </div>
  </div>
</main>

<footer class="text-center text-white-50 py-3 small">
  &copy; 2026 MarketTech - alfpala@gmail.com — <a href="https://wa.me/3204567890" target="_blank" class="text-white-50"><i class="bi bi-whatsapp me-1"></i>Soporte por WhatsApp</a>
</footer>

<div id="toast-container"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script type="module">
import { authAPI, Auth, toast } from "./js/api.js";

if (Auth.isLoggedIn()) window.location.href = "index.html";

// Activar visibilidad de la contraseña
document.getElementById("togglePwd").addEventListener("click", () => {
  const pwd = document.getElementById("password");
  const icon = document.querySelector("#togglePwd i");
  if (pwd.type === "password") { pwd.type = "text"; icon.className = "bi bi-eye-slash"; }
  else { pwd.type = "password"; icon.className = "bi bi-eye"; }
});

// Fortalecimiento de la contraseña
document.getElementById("password").addEventListener("input", (e) => {
  const val = e.target.value;
  const bar = document.getElementById("pwdStrengthBar");
  const label = document.getElementById("pwdStrengthLabel");
  let strength = 0;
  if (val.length >= 6)  strength++;
  if (val.length >= 10) strength++;
  if (/[A-Z]/.test(val)) strength++;
  if (/[0-9]/.test(val)) strength++;
  if (/[^A-Za-z0-9]/.test(val)) strength++;

  const levels = ["","Muy débil","Débil","Regular","Fuerte","Muy fuerte"];
  const colors = ["","#ef4444","#f97316","#eab308","#22c55e","#16a34a"];
  bar.style.width = (strength * 20) + "%";
  bar.style.background = colors[strength];
  label.textContent = levels[strength] || "";
  label.style.color = colors[strength];
});

document.getElementById("registerForm").addEventListener("submit", async (e) => {
  e.preventDefault();
  const name     = document.getElementById("name").value.trim();
  const email    = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value;
  const password2 = document.getElementById("password2").value;
  const terms    = document.getElementById("terms").checked;
  const alertBox = document.getElementById("alertBox");
  const btn      = document.getElementById("submitBtn");
  const spinner  = document.getElementById("btnSpinner");

  alertBox.classList.add("d-none");

  if (!name || !email || !password) {
    alertBox.className = "alert alert-warning"; alertBox.textContent = "Completa todos los campos."; alertBox.classList.remove("d-none"); return;
  }
  if (password.length < 6) {
    alertBox.className = "alert alert-warning"; alertBox.textContent = "La contraseña debe tener al menos 6 caracteres."; alertBox.classList.remove("d-none"); return;
  }
  if (password !== password2) {
    alertBox.className = "alert alert-danger"; alertBox.textContent = "Las contraseñas no coinciden."; alertBox.classList.remove("d-none"); return;
  }
  if (!terms) {
    alertBox.className = "alert alert-warning"; alertBox.textContent = "Debes aceptar los términos y condiciones."; alertBox.classList.remove("d-none"); return;
  }

  btn.disabled = true; spinner.classList.remove("d-none");

  try {
    const data = await authAPI.register({ name, email, password });
    localStorage.setItem("token", data.token);
    localStorage.setItem("user", JSON.stringify(data.user));
    toast("¡Cuenta creada con éxito! Bienvenido, " + data.user.name, "success");
    setTimeout(() => window.location.href = "index.html", 900);
  } catch (err) {
    alertBox.className = "alert alert-danger";
    alertBox.textContent = err.message || "Error al registrar";
    alertBox.classList.remove("d-none");
  } finally {
    btn.disabled = false; spinner.classList.add("d-none");
  }
});
</script>
</body>
</html>
