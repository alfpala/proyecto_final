<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Admin — Dashboard</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
  <link rel="stylesheet" href="css/admin.css"/>
</head>
<body>
<div id="sidebarMount"></div>

<div class="admin-main">
  <!-- Topbar -->
  <header class="admin-topbar">
    <button class="btn-toggle-sidebar" id="sidebarToggle"><i class="bi bi-list"></i></button>
    <div class="topbar-title">
      <h5><i class="bi bi-grid-1x2 me-2 text-primary"></i>Dashboard</h5>
      <small>Resumen general del sistema</small>
    </div>
    <div class="d-flex align-items-center gap-2">
      <span class="badge bg-success-subtle text-success fw-semibold">
        <i class="bi bi-circle-fill me-1" style="font-size:.5rem"></i>En línea
      </span>
    </div>
  </header>

  <div class="admin-content">

    <!-- TARJETAS DE ESTADÍSTICAS -->
    <div class="row g-3 mb-4" id="statsRow">
      <div class="col-sm-6 col-xl-2">
        <div class="stat-card h-100"><div class="stat-icon" style="background:#eff6ff"><i class="bi bi-people-fill text-primary"></i></div>
          <div class="stat-body"><div class="stat-label">Usuarios</div><div class="stat-value text-primary" id="sUsers">–</div></div></div>
      </div>
      <div class="col-sm-6 col-xl-2">
        <div class="stat-card h-100"><div class="stat-icon" style="background:#f0fdf4"><i class="bi bi-box-seam text-success"></i></div>
          <div class="stat-body"><div class="stat-label">Productos</div><div class="stat-value text-success" id="sProducts">–</div></div></div>
      </div>
      <div class="col-sm-6 col-xl-2">
        <div class="stat-card h-100"><div class="stat-icon" style="background:#fdf4ff"><i class="bi bi-receipt text-purple" style="color:#7c3aed"></i></div>
          <div class="stat-body"><div class="stat-label">Pedidos</div><div class="stat-value" style="color:#7c3aed" id="sOrders">–</div></div></div>
      </div>
      <div class="col-sm-6 col-xl-2">
        <div class="stat-card h-100"><div class="stat-icon" style="background:#fff7ed"><i class="bi bi-currency-dollar text-warning"></i></div>
          <div class="stat-body"><div class="stat-label">Ingresos</div><div class="stat-value text-warning" id="sRevenue">–</div></div></div>
      </div>
      <div class="col-sm-6 col-xl-2">
        <div class="stat-card h-100"><div class="stat-icon" style="background:#fff1f2"><i class="bi bi-heart text-danger"></i></div>
          <div class="stat-body"><div class="stat-label">Favoritos</div><div class="stat-value text-danger" id="sFavorites">–</div></div></div>
      </div>
      <div class="col-sm-6 col-xl-2">
        <div class="stat-card h-100"><div class="stat-icon" style="background:#f0fdf4"><i class="bi bi-archive text-success"></i></div>
          <div class="stat-body"><div class="stat-label">Inventario</div><div class="stat-value text-success fs-6" id="sInventory">–</div></div></div>
      </div>
    </div>

    <div class="row g-3">
      <!-- Pedidos por estado -->
      <div class="col-lg-5">
        <div class="table-card h-100">
          <div class="table-card-header">
            <h6><i class="bi bi-bar-chart me-2 text-primary"></i>Estado de Pedidos</h6>
          </div>
          <div class="p-3" id="statusChart">
            <div class="text-center text-muted py-3"><span class="spinner-border spinner-border-sm"></span></div>
          </div>
        </div>
      </div>

      <!-- Recent orders -->
      <div class="col-lg-7">
        <div class="table-card h-100">
          <div class="table-card-header">
            <h6><i class="bi bi-clock-history me-2 text-primary"></i>Últimos Pedidos</h6>
            <a href="orders.html" class="btn btn-sm btn-outline-primary">Ver todos</a>
          </div>
          <div class="table-responsive">
            <table class="admin-table">
              <thead><tr><th>#</th><th>Usuario</th><th>Total</th><th>Estado</th><th>Fecha</th></tr></thead>
              <tbody id="recentOrdersBody">
                <tr class="loading-row"><td colspan="5"><span class="spinner-border spinner-border-sm"></span> Cargando…</td></tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>

      <!-- Enlaces rápidos -->
      <div class="col-12">
        <div class="table-card">
          <div class="table-card-header"><h6><i class="bi bi-lightning me-2 text-warning"></i>Acciones Rápidas</h6></div>
          <div class="p-3 d-flex flex-wrap gap-2">
            <a href="products.html" class="btn btn-primary btn-sm"><i class="bi bi-plus-circle me-1"></i>Nuevo Producto</a>
            <a href="categories.html" class="btn btn-success btn-sm"><i class="bi bi-plus-circle me-1"></i>Nueva Categoría</a>
            <a href="users.html" class="btn btn-info btn-sm text-white"><i class="bi bi-person-plus me-1"></i>Nuevo Usuario</a>
            <a href="orders.html" class="btn btn-warning btn-sm"><i class="bi bi-receipt me-1"></i>Gestionar Pedidos</a>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<div id="admin-toasts"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script type="module">
import { AdminAuth, dashboardAPI, ordersAPI, toast } from "./js/admin-api.js";
import { injectSidebar } from "./js/sidebar.js";

AdminAuth.requireAdmin();
injectSidebar("dashboard.html");
const user = AdminAuth.getUser();
if (user) {
  const av = document.getElementById("sidebarAvatar");
  const nm = document.getElementById("sidebarName");
  if (av) av.textContent = user.name.charAt(0).toUpperCase();
  if (nm) nm.textContent = user.name;
}

const STATUS = { pending:"s-pending", confirmed:"s-confirmed", shipped:"s-shipped", delivered:"s-delivered", cancelled:"s-cancelled" };
const STATUS_LABEL = { pending:"Pendiente", confirmed:"Confirmado", shipped:"En camino", delivered:"Entregado", cancelled:"Cancelado" };

async function loadDashboard() {
  try {
    const d = await dashboardAPI.get();
    document.getElementById("sUsers").textContent    = d.users;
    document.getElementById("sProducts").textContent = d.products;
    document.getElementById("sOrders").textContent   = d.orders;
    document.getElementById("sRevenue").textContent  = "$" + parseFloat(d.revenue).toFixed(2);
    document.getElementById("sFavorites").textContent = d.favorites;
    document.getElementById("sInventory").textContent = "$" + parseFloat(d.inventory).toFixed(0);

    // Gráfico de estado
    const total = d.orders || 1;
    const colors = { pending:"#f59e0b", confirmed:"#2563eb", shipped:"#7c3aed", delivered:"#059669", cancelled:"#dc2626" };
    document.getElementById("statusChart").innerHTML = (d.ordersByStatus || []).length === 0
      ? `<p class="text-muted text-center small py-3">Sin pedidos aún</p>`
      : (d.ordersByStatus || []).map(s => `
          <div class="mb-3">
            <div class="d-flex justify-content-between small mb-1">
              <span class="fw-semibold">${STATUS_LABEL[s.status]||s.status}</span>
              <span class="text-muted">${s.count} (${Math.round(s.count/total*100)}%)</span>
            </div>
            <div class="progress" style="height:10px;border-radius:20px">
              <div class="progress-bar" style="width:${Math.round(s.count/total*100)}%;background:${colors[s.status]||'#94a3b8'}"></div>
            </div>
          </div>`).join("");
  } catch {}
}

async function loadRecentOrders() {
  try {
    const { orders } = await ordersAPI.list({ limit: 5 });
    const tbody = document.getElementById("recentOrdersBody");
    if (!orders.length) { tbody.innerHTML = `<tr><td colspan="5" class="text-center text-muted">Sin pedidos</td></tr>`; return; }
    tbody.innerHTML = orders.map(o => `
      <tr>
        <td class="fw-bold">#${o.id}</td>
        <td>${o.user_name || "–"}<br><small class="text-muted">${o.user_email||""}</small></td>
        <td class="fw-bold">$${parseFloat(o.total).toFixed(2)}</td>
        <td><span class="status-badge ${STATUS[o.status]||"s-pending"}">${STATUS_LABEL[o.status]||o.status}</span></td>
        <td class="text-muted small">${new Date(o.created_at).toLocaleDateString("es-ES")}</td>
      </tr>`).join("");
  } catch {}
}

loadDashboard();
loadRecentOrders();
</script>
</body>
</html>
