<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Admin — Iniciar Sesión</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
  <link rel="stylesheet" href="css/admin.css"/>
  <style>
    body { background: linear-gradient(135deg,#0f172a 0%,#1e3a5f 100%); min-height:100vh; display:flex; align-items:center; justify-content:center; }
    .login-card { width:100%; max-width:420px; border-radius:16px; box-shadow:0 25px 60px rgba(0,0,0,.4); overflow:hidden; }
    .login-header { background:linear-gradient(135deg,#2563eb,#7c3aed); padding:2rem; text-align:center; }
    .login-body { background:#fff; padding:2rem; }
  </style>
</head>
<body>
<div class="login-card">
  <div class="login-header">
    <i class="bi bi-lightning-charge-fill text-warning fs-1"></i>
    <h4 class="text-white fw-bold mt-2 mb-0">MarketTech Admin</h4>
    <small class="text-white-50">Panel de Administración</small>
  </div>
  <div class="login-body">
    <div id="alertBox" class="alert d-none mb-3" role="alert"></div>

    <form id="loginForm" novalidate>
      <div class="mb-3">
        <label class="form-label">Correo electrónico</label>
        <div class="input-group">
          <span class="input-group-text bg-light"><i class="bi bi-envelope text-muted"></i></span>
          <input type="email" id="email" class="form-control" placeholder="admin@admin.com" required autocomplete="username"/>
          <div class="invalid-feedback">Ingresa un correo válido</div>
        </div>
      </div>
      <div class="mb-4">
        <label class="form-label">Contraseña</label>
        <div class="input-group">
          <span class="input-group-text bg-light"><i class="bi bi-lock text-muted"></i></span>
          <input type="password" id="password" class="form-control" placeholder="••••••••" required autocomplete="current-password"/>
          <button type="button" class="btn btn-outline-secondary" id="togglePwd" tabindex="-1">
            <i class="bi bi-eye"></i>
          </button>
          <div class="invalid-feedback">Ingresa tu contraseña</div>
        </div>
      </div>

      <button type="submit" id="submitBtn" class="btn btn-primary-admin btn btn-primary w-100 py-2 fw-semibold fs-6">
        <span id="btnText"><i class="bi bi-box-arrow-in-right me-2"></i>Ingresar</span>
        <span id="btnSpinner" class="d-none"><span class="spinner-border spinner-border-sm me-2"></span>Verificando…</span>
      </button>
    </form>

    <div class="alert alert-light border mt-3 p-2 text-center small">
      <i class="bi bi-info-circle text-primary me-1"></i>
      <strong>Demo:</strong> admin@admin.com &nbsp;/&nbsp; admin123
    </div>

    <p class="text-center mt-3 mb-0 small text-muted">
      <a href="../index.html" class="text-decoration-none"><i class="bi bi-arrow-left me-1"></i>Volver a la tienda</a>
    </p>
  </div>
</div>

<div id="admin-toasts"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script type="module">
import { authAPI, AdminAuth, toast } from "./js/admin-api.js";

// Si ya ha iniciado sesión como administrador, redirigir
if (AdminAuth.isAdmin()) window.location.href = "dashboard.html";

// Alternar contraseña
document.getElementById("togglePwd").addEventListener("click", () => {
  const pwd  = document.getElementById("password");
  const icon = document.querySelector("#togglePwd i");
  pwd.type = pwd.type === "password" ? "text" : "password";
  icon.className = pwd.type === "text" ? "bi bi-eye-slash" : "bi bi-eye";
});

// Enviar formulario
document.getElementById("loginForm").addEventListener("submit", async (e) => {
  e.preventDefault();
  const email    = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value;
  const alertBox = document.getElementById("alertBox");
  const btnText  = document.getElementById("btnText");
  const spinner  = document.getElementById("btnSpinner");
  const btn      = document.getElementById("submitBtn");

  alertBox.classList.add("d-none");

  // Validación del lado del cliente
  if (!email || !/\S+@\S+\.\S+/.test(email)) {
    alertBox.className = "alert alert-warning"; alertBox.textContent = "Ingresa un correo electrónico válido."; alertBox.classList.remove("d-none"); return;
  }
  if (!password) {
    alertBox.className = "alert alert-warning"; alertBox.textContent = "Ingresa tu contraseña."; alertBox.classList.remove("d-none"); return;
  }

  btn.disabled = true; btnText.classList.add("d-none"); spinner.classList.remove("d-none");

  try {
    const data = await authAPI.login({ email, password });
    if (data.user.role !== "admin") {
      alertBox.className = "alert alert-danger";
      alertBox.textContent = "Acceso denegado. Solo administradores pueden ingresar aquí.";
      alertBox.classList.remove("d-none");
      return;
    }
    localStorage.setItem("admin_token", data.token);
    localStorage.setItem("admin_user",  JSON.stringify(data.user));
    toast("¡Bienvenido, " + data.user.name + "!", "ok");
    setTimeout(() => window.location.href = "dashboard.html", 700);
  } catch (err) {
    alertBox.className = "alert alert-danger";
    alertBox.textContent = err.message || "Credenciales inválidas. Intenta de nuevo.";
    alertBox.classList.remove("d-none");
  } finally {
    btn.disabled = false; btnText.classList.remove("d-none"); spinner.classList.add("d-none");
  }
});
</script>
</body>
</html>
