<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Admin — Categorías</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
  <link rel="stylesheet" href="css/admin.css"/>
</head>
<body>
<div id="sidebarMount"></div>
<div class="admin-main">
  <header class="admin-topbar">
    <button class="btn-toggle-sidebar" id="sidebarToggle"><i class="bi bi-list"></i></button>
    <div class="topbar-title">
      <h5><i class="bi bi-tags-fill me-2 text-success"></i>Gestión de Categorías</h5>
      <small>Crear y administrar categorías de productos</small>
    </div>
    <button class="btn btn-success btn-sm" id="btnNewCat"><i class="bi bi-plus-lg me-1"></i>Nueva Categoría</button>
  </header>

  <div class="admin-content">
    <div class="row g-2 mb-3">
      <div class="col-md-6">
        <div class="input-group">
          <span class="input-group-text bg-white"><i class="bi bi-search text-muted"></i></span>
          <input type="search" id="searchInput" class="form-control" placeholder="Buscar categoría…"/>
        </div>
      </div>
      <div class="col-md-2">
        <button class="btn btn-outline-secondary w-100" id="btnRefresh"><i class="bi bi-arrow-clockwise me-1"></i>Refrescar</button>
      </div>
    </div>

    <div class="table-card">
      <div class="table-card-header">
        <h6 class="mb-0"><i class="bi bi-table me-2"></i>Categorías <span class="badge bg-success ms-1" id="totalBadge">0</span></h6>
      </div>
      <div class="table-responsive">
        <table class="admin-table">
          <thead><tr><th>ID</th><th>Nombre</th><th>Descripción</th><th>Productos</th><th class="text-end">Acciones</th></tr></thead>
          <tbody id="catsBody">
            <tr class="loading-row"><td colspan="5"><span class="spinner-border spinner-border-sm me-2"></span>Cargando…</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<!-- MODAL CREATE/EDIT -->
<div class="modal fade" id="catModal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="modalTitle">Nueva Categoría</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <form id="catForm" novalidate>
          <input type="hidden" id="catId"/>
          <div class="mb-3">
            <label class="form-label">Nombre <span class="text-danger">*</span></label>
            <input type="text" id="cName" class="form-control" placeholder="Ej: Electrónica" required maxlength="100"/>
            <div class="invalid-feedback" id="errName">El nombre es obligatorio (mín. 2 caracteres)</div>
          </div>
          <div class="mb-3">
            <label class="form-label">Descripción</label>
            <textarea id="cDesc" class="form-control" rows="3" placeholder="Descripción opcional…" maxlength="500"></textarea>
            <div class="form-text">Máximo 500 caracteres. <span id="descCount">0</span>/500</div>
          </div>
        </form>
      </div>
      <div class="modal-footer">
        <button class="btn btn-light" data-bs-dismiss="modal">Cancelar</button>
        <button class="btn btn-success" id="btnSaveCat">
          <span id="saveBtnText"><i class="bi bi-check-lg me-1"></i>Guardar</span>
          <span id="saveSpinner" class="d-none spinner-border spinner-border-sm"></span>
        </button>
      </div>
    </div>
  </div>
</div>

<!-- DELETE MODAL -->
<div class="modal fade" id="deleteModal" tabindex="-1">
  <div class="modal-dialog modal-sm">
    <div class="modal-content text-center">
      <div class="modal-body p-4">
        <i class="bi bi-exclamation-triangle-fill text-danger fs-1 mb-3 d-block"></i>
        <h6 class="fw-bold">¿Eliminar categoría?</h6>
        <p class="text-muted small" id="deleteCatMsg">Esta categoría será eliminada.</p>
        <div class="d-flex gap-2 justify-content-center mt-3">
          <button class="btn btn-light btn-sm" data-bs-dismiss="modal">Cancelar</button>
          <button class="btn btn-danger btn-sm" id="btnConfirmDelete"><i class="bi bi-trash me-1"></i>Eliminar</button>
        </div>
      </div>
    </div>
  </div>
</div>

<div id="admin-toasts"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script type="module">
import { AdminAuth, categoriesAPI, toast, debounce } from "./js/admin-api.js";
import { injectSidebar } from "./js/sidebar.js";

AdminAuth.requireAdmin();
injectSidebar("categories.html");
const user = AdminAuth.getUser();
if (user) {
  const av = document.getElementById("sidebarAvatar"); const nm = document.getElementById("sidebarName");
  if (av) av.textContent = user.name.charAt(0).toUpperCase();
  if (nm) nm.textContent = user.name;
}

let editingId = null;
let deleteId = null;
let allCats = [];
const catModal    = new bootstrap.Modal(document.getElementById("catModal"));
const deleteModal = new bootstrap.Modal(document.getElementById("deleteModal"));

// Descripción contador de caracteres
document.getElementById("cDesc").addEventListener("input", (e) => {
  document.getElementById("descCount").textContent = e.target.value.length;
});

async function load() {
  try {
    allCats = await categoriesAPI.list();
    renderTable(document.getElementById("searchInput").value.trim());
    document.getElementById("totalBadge").textContent = allCats.length;
  } catch {}
}

function renderTable(filter) {
  const tbody = document.getElementById("catsBody");
  const rows = filter
    ? allCats.filter(c => c.name.toLowerCase().includes(filter.toLowerCase()) || (c.description||"").toLowerCase().includes(filter.toLowerCase()))
    : allCats;

  if (!rows.length) {
    tbody.innerHTML = `<tr><td colspan="5" class="text-center py-4 text-muted"><i class="bi bi-tags fs-3 d-block mb-2"></i>Sin categorías encontradas</td></tr>`;
    return;
  }
  tbody.innerHTML = rows.map(c => `
    <tr>
      <td class="text-muted">#${c.id}</td>
      <td><span class="fw-semibold"><i class="bi bi-tag-fill text-success me-2"></i>${escHtml(c.name)}</span></td>
      <td class="text-muted">${c.description ? escHtml(c.description).substring(0,60)+(c.description.length>60?"…":"") : "<em>Sin descripción</em>"}</td>
      <td><span class="badge bg-light text-dark border">${c.product_count} producto(s)</span></td>
      <td class="text-end">
        <button class="btn btn-sm btn-outline-primary btn-sm-action me-1" onclick="openEdit(${c.id})"><i class="bi bi-pencil"></i></button>
        <button class="btn btn-sm btn-outline-danger btn-sm-action" onclick="openDelete(${c.id},'${escHtml(c.name)}',${c.product_count})"><i class="bi bi-trash"></i></button>
      </td>
    </tr>`).join("");
}

function validate() {
  clearErrors();
  const name = document.getElementById("cName").value.trim();
  if (!name || name.length < 2) {
    document.getElementById("cName").classList.add("is-invalid");
    return false;
  }
  return true;
}
function clearErrors() { document.getElementById("cName").classList.remove("is-invalid"); }
function escHtml(s) { return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/"/g,"&quot;"); }

document.getElementById("btnNewCat").addEventListener("click", () => {
  editingId = null; clearErrors();
  document.getElementById("modalTitle").textContent = "Nueva Categoría";
  document.getElementById("catId").value = "";
  document.getElementById("cName").value = "";
  document.getElementById("cDesc").value = ""; document.getElementById("descCount").textContent = "0";
  catModal.show();
});

window.openEdit = (id) => {
  const c = allCats.find(x => x.id === id); if (!c) return;
  editingId = id; clearErrors();
  document.getElementById("modalTitle").textContent = "Editar Categoría";
  document.getElementById("catId").value   = c.id;
  document.getElementById("cName").value   = c.name;
  document.getElementById("cDesc").value   = c.description || "";
  document.getElementById("descCount").textContent = (c.description||"").length;
  catModal.show();
};

document.getElementById("btnSaveCat").addEventListener("click", async () => {
  if (!validate()) return;
  const payload = { name: document.getElementById("cName").value.trim(), description: document.getElementById("cDesc").value.trim() };
  const saveText = document.getElementById("saveBtnText"); const spinner = document.getElementById("saveSpinner");
  saveText.classList.add("d-none"); spinner.classList.remove("d-none");
  try {
    if (editingId) {
      await categoriesAPI.update(editingId, payload);
      toast("Categoría actualizada", "ok");
    } else {
      await categoriesAPI.create(payload);
      toast("Categoría creada", "ok");
    }
    catModal.hide(); load();
  } catch {} finally {
    saveText.classList.remove("d-none"); spinner.classList.add("d-none");
  }
});

window.openDelete = (id, name, count) => {
  deleteId = id;
  document.getElementById("deleteCatMsg").innerHTML =
    `<strong>"${escHtml(name)}"</strong> será eliminada.` +
    (count > 0 ? `<br><span class="text-danger small"><i class="bi bi-exclamation-triangle me-1"></i>Tiene <strong>${count}</strong> producto(s) asociado(s). Primero reasígnalos.</span>` : "");
  deleteModal.show();
};
document.getElementById("btnConfirmDelete").addEventListener("click", async () => {
  if (!deleteId) return;
  try { await categoriesAPI.delete(deleteId); toast("Categoría eliminada", "ok"); deleteModal.hide(); load(); } catch {}
});

document.getElementById("searchInput").addEventListener("input", debounce((e) => renderTable(e.target.value.trim())));
document.getElementById("btnRefresh").addEventListener("click", load);
load();
</script>
</body>
</html>
