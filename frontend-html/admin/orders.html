<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Admin — Pedidos</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
  <link rel="stylesheet" href="css/admin.css"/>
</head>
<body>
<div id="sidebarMount"></div>
<div class="admin-main">
  <header class="admin-topbar">
    <button class="btn-toggle-sidebar" id="sidebarToggle"><i class="bi bi-list"></i></button>
    <div class="topbar-title">
      <h5><i class="bi bi-receipt-cutoff me-2" style="color:#7c3aed"></i>Gestión de Pedidos</h5>
      <small>Consultar y actualizar el estado de todas las órdenes</small>
    </div>
  </header>

  <div class="admin-content">
    <!-- Filtros de estado-->
    <div class="row g-2 mb-3">
      <div class="col-md-3">
        <select id="statusFilter" class="form-select">
          <option value="">Todos los estados</option>
          <option value="pending">Pendiente</option>
          <option value="confirmed">Confirmado</option>
          <option value="shipped">En camino</option>
          <option value="delivered">Entregado</option>
          <option value="cancelled">Cancelado</option>
        </select>
      </div>
      <div class="col-md-4">
        <div class="input-group">
          <span class="input-group-text bg-white"><i class="bi bi-search text-muted"></i></span>
          <input type="text" id="searchInput" class="form-control" placeholder="Buscar por usuario…" style="display:none"/>
        </div>
      </div>
      <div class="col-md-2">
        <button class="btn btn-outline-secondary w-100" id="btnRefresh"><i class="bi bi-arrow-clockwise me-1"></i>Refrescar</button>
      </div>
    </div>

    <div class="table-card">
      <div class="table-card-header">
        <h6 class="mb-0"><i class="bi bi-table me-2"></i>Pedidos <span class="badge ms-1" style="background:#7c3aed" id="totalBadge">0</span></h6>
        <div class="admin-pagination" id="pagination"></div>
      </div>
      <div class="table-responsive">
        <table class="admin-table">
          <thead>
            <tr><th>#</th><th>Usuario</th><th>Total</th><th>Estado</th><th>Items</th><th>Fecha</th><th class="text-end">Acciones</th></tr>
          </thead>
          <tbody id="ordersBody">
            <tr class="loading-row"><td colspan="7"><span class="spinner-border spinner-border-sm me-2"></span>Cargando…</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<!-- MODAL VER DETALLE DE ORDEN -->
<div class="modal fade" id="detailModal" tabindex="-1">
  <div class="modal-dialog modal-lg">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="detailTitle">Detalle de Orden</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body" id="detailBody">Cargando…</div>
      <div class="modal-footer">
        <button class="btn btn-light" data-bs-dismiss="modal">Cerrar</button>
        <button class="btn btn-primary btn-sm" id="btnChangeStatus"><i class="bi bi-arrow-repeat me-1"></i>Cambiar Estado</button>
      </div>
    </div>
  </div>
</div>

<!-- MODAL CAMBIAR ESTADO -->
<div class="modal fade" id="statusModal" tabindex="-1">
  <div class="modal-dialog modal-sm">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">Cambiar Estado</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <p class="text-muted small mb-2">Orden <strong id="statusOrderId">#0</strong></p>
        <label class="form-label">Nuevo estado <span class="text-danger">*</span></label>
        <select id="newStatus" class="form-select">
          <option value="pending"> Pendiente</option>
          <option value="confirmed"> Confirmado</option>
          <option value="shipped"> En camino</option>
          <option value="delivered"> Entregado</option>
          <option value="cancelled"> Cancelado</option>
        </select>
        <div class="invalid-feedback" id="errStatus" style="display:none">Selecciona un estado válido</div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-light btn-sm" data-bs-dismiss="modal">Cancelar</button>
        <button class="btn btn-primary btn-sm" id="btnConfirmStatus">
          <span id="statusBtnText"><i class="bi bi-check-lg me-1"></i>Actualizar</span>
          <span id="statusSpinner" class="d-none spinner-border spinner-border-sm"></span>
        </button>
      </div>
    </div>
  </div>
</div>

<div id="admin-toasts"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script type="module">
import { AdminAuth, ordersAPI, toast, buildPagination } from "./js/admin-api.js";
import { injectSidebar } from "./js/sidebar.js";

AdminAuth.requireAdmin();
injectSidebar("orders.html");
const user = AdminAuth.getUser();
if (user) {
  const av = document.getElementById("sidebarAvatar"); const nm = document.getElementById("sidebarName");
  if (av) av.textContent = user.name.charAt(0).toUpperCase();
  if (nm) nm.textContent = user.name;
}

const STATUS_LABEL = { pending:"Pendiente", confirmed:"Confirmado", shipped:"En camino", delivered:"Entregado", cancelled:"Cancelado" };
const STATUS_CLASS = { pending:"s-pending", confirmed:"s-confirmed", shipped:"s-shipped", delivered:"s-delivered", cancelled:"s-cancelled" };

let currentPage = 1;
let currentOrderId = null;
const detailModal = new bootstrap.Modal(document.getElementById("detailModal"));
const statusModal = new bootstrap.Modal(document.getElementById("statusModal"));

async function load() {
  const status = document.getElementById("statusFilter").value;
  const tbody = document.getElementById("ordersBody");
  tbody.innerHTML = `<tr class="loading-row"><td colspan="7"><span class="spinner-border spinner-border-sm me-2"></span>Cargando…</td></tr>`;
  try {
    const params = { page: currentPage, limit: 15, status };
    if (!status) delete params.status;
    const { orders, total } = await ordersAPI.list(params);
    document.getElementById("totalBadge").textContent = total;

    if (!orders.length) {
      tbody.innerHTML = `<tr><td colspan="7" class="text-center py-4 text-muted"><i class="bi bi-receipt fs-3 d-block mb-2"></i>Sin pedidos encontrados</td></tr>`;
      document.getElementById("pagination").innerHTML = ""; return;
    }
    tbody.innerHTML = orders.map(o => `
      <tr>
        <td class="fw-bold text-primary">#${o.id}</td>
        <td>
          <strong>${escHtml(o.user_name||"—")}</strong>
          <br><small class="text-muted">${escHtml(o.user_email||"")}</small>
        </td>
        <td class="fw-bold">$${parseFloat(o.total).toFixed(2)}</td>
        <td><span class="status-badge ${STATUS_CLASS[o.status]||"s-pending"}">${STATUS_LABEL[o.status]||o.status}</span></td>
        <td><span class="badge bg-light text-dark border">${(o.items||[]).length} item(s)</span></td>
        <td class="text-muted small">${new Date(o.created_at).toLocaleString("es-ES",{dateStyle:"short",timeStyle:"short"})}</td>
        <td class="text-end">
          <button class="btn btn-sm btn-outline-primary btn-sm-action me-1" onclick="openDetail(${o.id})">
            <i class="bi bi-eye"></i>
          </button>
          <button class="btn btn-sm btn-outline-warning btn-sm-action" onclick="openStatus(${o.id},'${o.status}')">
            <i class="bi bi-arrow-repeat"></i>
          </button>
        </td>
      </tr>`).join("");

    buildPagination("pagination", total, 15, currentPage, (pg) => { currentPage = pg; load(); });
  } catch {}
}

function escHtml(s) { return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/"/g,"&quot;"); }

window.openDetail = async (id) => {
  currentOrderId = id;
  document.getElementById("detailTitle").textContent = `Orden #${id}`;
  document.getElementById("detailBody").innerHTML = `<div class="text-center py-3"><span class="spinner-border"></span></div>`;
  detailModal.show();
  try {
    const o = await ordersAPI.get(id);
    const itemsHtml = (o.items||[]).map(i => `
      <div class="d-flex align-items-center gap-3 p-2 border rounded mb-2">
        <img src="${i.image_url||'https://via.placeholder.com/50'}" style="width:50px;height:50px;object-fit:cover;border-radius:6px" onerror="this.src='https://via.placeholder.com/50'"/>
        <div class="flex-grow-1">
          <div class="fw-semibold">${escHtml(i.product_name||"Producto eliminado")}</div>
          <small class="text-muted">x${i.quantity} — $${parseFloat(i.unit_price).toFixed(2)} c/u</small>
        </div>
        <div class="fw-bold text-primary">$${(i.quantity * parseFloat(i.unit_price)).toFixed(2)}</div>
      </div>`).join("");

    document.getElementById("detailBody").innerHTML = `
      <div class="row g-3 mb-3">
        <div class="col-sm-6">
          <small class="text-muted d-block">Cliente</small>
          <strong>${escHtml(o.user_name||"—")}</strong>
          <div class="text-muted small">${escHtml(o.user_email||"")}</div>
        </div>
        <div class="col-sm-3">
          <small class="text-muted d-block">Estado</small>
          <span class="status-badge ${STATUS_CLASS[o.status]||"s-pending"} fs-6">${STATUS_LABEL[o.status]||o.status}</span>
        </div>
        <div class="col-sm-3">
          <small class="text-muted d-block">Fecha</small>
          <strong>${new Date(o.created_at).toLocaleString("es-ES",{dateStyle:"medium",timeStyle:"short"})}</strong>
        </div>
      </div>
      <hr/>
      <h6 class="fw-bold mb-3">Productos del pedido</h6>
      ${itemsHtml || '<p class="text-muted">Sin items</p>'}
      <div class="d-flex justify-content-end mt-3 pt-2 border-top">
        <span class="fs-5 fw-bold">Total: <span class="text-primary">$${parseFloat(o.total).toFixed(2)}</span></span>
      </div>`;
  } catch {}
};

document.getElementById("btnChangeStatus").addEventListener("click", () => {
  openStatus(currentOrderId);
  detailModal.hide();
});

window.openStatus = async (id, currentStatus) => {
  currentOrderId = id;
  document.getElementById("statusOrderId").textContent = "#" + id;
  if (currentStatus) document.getElementById("newStatus").value = currentStatus;
  statusModal.show();
};

document.getElementById("btnConfirmStatus").addEventListener("click", async () => {
  const newStatus = document.getElementById("newStatus").value;
  if (!newStatus) return;
  const btnText = document.getElementById("statusBtnText"); const spinner = document.getElementById("statusSpinner");
  btnText.classList.add("d-none"); spinner.classList.remove("d-none");
  try {
    await ordersAPI.updateStatus(currentOrderId, newStatus);
    toast(`Estado actualizado a "${STATUS_LABEL[newStatus]}"`, "ok");
    statusModal.hide();
    load();
  } catch {} finally {
    btnText.classList.remove("d-none"); spinner.classList.add("d-none");
  }
});

document.getElementById("statusFilter").addEventListener("change", () => { currentPage = 1; load(); });
document.getElementById("btnRefresh").addEventListener("click", load);
load();
</script>
</body>
</html>
